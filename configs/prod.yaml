environment: prod
snowflake:
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  password: ${SNOWFLAKE_PASSWORD}
  role: ${SNOWFLAKE_ROLE}
  warehouse: CUSTOMER360_PROD_WH
  database: CUSTOMER360_DB
  schema: LANDING
  authenticator: snowflake
  login_timeout_seconds: 30
  query_timeout_seconds: 900
airflow:
  airflow_home: ${AIRFLOW_HOME:-/opt/airflow}
  dag_owner: customer360-data-engineering
  schedule_timezone: America/Chicago
  max_active_runs: 1
  catchup: false
  email_on_failure: true
  retries: 2
  retry_delay_minutes: 10
  default_pool: customer360_pool
  dags:
    customer_ingestion_dag:
      schedule: "@hourly"
      enabled: true
    customer_standardization_dag:
      schedule: "@hourly"
      enabled: true
    customer_matching_dag:
      schedule: "0 2 * * *"
      enabled: true
    customer_enrichment_dag:
      schedule: "0 3 * * *"
      enabled: true
    dashboard_refresh_dag:
      schedule: "0 4 * * *"
      enabled: true
splink:
  sql_dialect: snowflake
  link_type: link_and_dedupe
  unique_id_column: source_customer_id
  source_dataset_column: source_system
  match_threshold: 0.95
  deterministic_rules:
    - "l.email = r.email"
    - "l.phone = r.phone"
    - "l.company_name = r.company_name"
  blocking_rules:
    - "l.email = r.email"
    - "l.phone = r.phone"
    - "l.company_name = r.company_name"
  comparisons:
    - column: company_name
      method: jaro_winkler
      threshold: 0.92
    - column: email
      method: exact
    - column: phone
      method: exact
    - column: address
      method: levenshtein
      threshold: 0.88
    - column: website_domain
      method: exact
  retain_matching_columns: true
  max_iterations: 20
  output_table: CUSTOMER360_DB.GOLD.customer_match_predictions
  cluster_table: CUSTOMER360_DB.GOLD.gold_customer_clusters
logging:
  level: INFO
  renderer: json
  enable_structured_logging: true
  pipeline_execution_log_table: CUSTOMER360_DB.ANALYTICS.pipeline_execution_log
  etl_audit_log_table: CUSTOMER360_DB.ANALYTICS.etl_audit_log
  retention_days: 365
pipeline:
  batch_size: 50000
  freshness_hours: 24
  matching_threshold: 0.95
  cdc_column: last_modified_timestamp
  audit_history_enabled: true
ingestion:
  default_batch_size: 50000
  retry:
    max_attempts: 4
    initial_delay_seconds: 2
    max_delay_seconds: 60
    backoff_multiplier: 2.0
    retryable_status_codes: [429, 500, 502, 503, 504]
  sources:
    salesforce:
      enabled: true
      source_system: SALESFORCE
      source_object: ACCOUNT
      source_type: api
      target_table: CUSTOMER360_DB.BRONZE.salesforce_customer_bronze
      primary_key: customer_id
      watermark_column: last_modified_timestamp
      api:
        base_url: ${SALESFORCE_API_BASE_URL}
        endpoint: /services/data/v60.0/query
        auth_token: ${SALESFORCE_API_TOKEN}
        records_path: records
        next_page_token_path: nextRecordsUrl
        pagination_strategy: cursor
        watermark_param: updated_since
        page_size: 2000
    marketo:
      enabled: true
      source_system: MARKETO
      source_object: LEAD
      source_type: api
      target_table: CUSTOMER360_DB.BRONZE.marketo_lead_bronze
      primary_key: lead_id
      watermark_column: last_modified_timestamp
      api:
        base_url: ${MARKETO_API_BASE_URL}
        endpoint: /rest/v1/leads.json
        auth_token: ${MARKETO_API_TOKEN}
        records_path: result
        next_page_token_path: nextPageToken
        pagination_strategy: cursor
        cursor_param: nextPageToken
        watermark_param: updatedAt
        page_size: 300
    zendesk:
      enabled: true
      source_system: ZENDESK
      source_object: SUPPORT_ACCOUNT
      source_type: api
      target_table: CUSTOMER360_DB.BRONZE.zendesk_support_bronze
      primary_key: support_account_id
      watermark_column: last_modified_timestamp
      api:
        base_url: ${ZENDESK_API_BASE_URL}
        endpoint: /api/v2/incremental/tickets/cursor.json
        auth_token: ${ZENDESK_API_TOKEN}
        records_path: tickets
        next_page_token_path: after_cursor
        pagination_strategy: cursor
        cursor_param: cursor
        watermark_param: start_time
        page_size: 1000
    product_usage:
      enabled: true
      source_system: PRODUCT_USAGE
      source_object: USAGE_DAILY
      source_type: api
      target_table: CUSTOMER360_DB.BRONZE.product_usage_bronze
      primary_key: usage_event_id
      watermark_column: last_modified_timestamp
      api:
        base_url: ${PRODUCT_USAGE_API_BASE_URL}
        endpoint: /v1/usage/daily
        auth_token: ${PRODUCT_USAGE_API_TOKEN}
        records_path: data
        pagination_strategy: offset
        watermark_param: updated_since
        page_size: 5000
    licensing:
      enabled: true
      source_system: LICENSING
      source_object: LICENSE
      source_type: api
      target_table: CUSTOMER360_DB.BRONZE.licensing_customer_bronze
      primary_key: license_id
      watermark_column: last_modified_timestamp
      api:
        base_url: ${LICENSING_API_BASE_URL}
        endpoint: /v1/licenses
        auth_token: ${LICENSING_API_TOKEN}
        records_path: data
        pagination_strategy: page
        watermark_param: updated_since
        page_size: 1000
    impartner:
      enabled: true
      source_system: IMPARTNER
      source_object: PARTNER
      source_type: api
      target_table: CUSTOMER360_DB.BRONZE.impartner_partner_bronze
      primary_key: partner_id
      watermark_column: last_modified_timestamp
      api:
        base_url: ${IMPARTNER_API_BASE_URL}
        endpoint: /api/partners
        auth_token: ${IMPARTNER_API_TOKEN}
        records_path: partners
        pagination_strategy: page
        watermark_param: updated_since
        page_size: 1000
domo:
  api_host: ${DOMO_API_HOST:-https://api.domo.com}
  client_id: ${DOMO_CLIENT_ID}
  client_secret: ${DOMO_CLIENT_SECRET}
  access_token: ${DOMO_ACCESS_TOKEN:-}
  dataset_prefix: customer360
  timeout_seconds: 30
  retry_attempts: 3
