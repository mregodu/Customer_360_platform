environment: test
snowflake:
  account: ${SNOWFLAKE_ACCOUNT:-local-test}
  user: ${SNOWFLAKE_USER:-customer360_test}
  password: ${SNOWFLAKE_PASSWORD:-test_password}
  role: ${SNOWFLAKE_ROLE:-CUSTOMER360_TEST_ROLE}
  warehouse: TEST_WH
  database: CUSTOMER360_TEST_DB
  schema: LANDING
  authenticator: snowflake
  login_timeout_seconds: 10
  query_timeout_seconds: 120
airflow:
  airflow_home: ${AIRFLOW_HOME:-./airflow}
  dag_owner: customer360-data-engineering
  schedule_timezone: America/Chicago
  max_active_runs: 1
  catchup: false
  email_on_failure: false
  retries: 0
  retry_delay_minutes: 1
  default_pool: test_pool
  dags:
    customer_ingestion_dag:
      schedule: "@hourly"
      enabled: true
    customer_standardization_dag:
      schedule: "@hourly"
      enabled: true
    customer_matching_dag:
      schedule: "0 2 * * *"
      enabled: true
    customer_enrichment_dag:
      schedule: "0 3 * * *"
      enabled: true
    customer_scoring_dag:
      schedule: "30 3 * * *"
      enabled: true
    dashboard_refresh_dag:
      schedule: "0 4 * * *"
      enabled: true
splink:
  sql_dialect: snowflake
  link_type: link_and_dedupe
  unique_id_column: source_customer_id
  source_dataset_column: source_system
  match_threshold: 0.95
  deterministic_rules:
    - "l.email = r.email"
    - "l.phone = r.phone"
    - "l.company_name = r.company_name"
  blocking_rules:
    - "l.email = r.email"
    - "l.phone = r.phone"
    - "l.company_name = r.company_name"
  comparisons:
    - column: company_name
      method: jaro_winkler
      threshold: 0.92
    - column: email
      method: exact
    - column: phone
      method: exact
    - column: address
      method: levenshtein
      threshold: 0.88
    - column: website_domain
      method: exact
  retain_matching_columns: true
  max_iterations: 5
  output_table: CUSTOMER360_TEST_DB.GOLD.customer_match_predictions
  cluster_table: CUSTOMER360_TEST_DB.GOLD.gold_customer_clusters
logging:
  level: INFO
  renderer: console
  enable_structured_logging: false
  pipeline_execution_log_table: CUSTOMER360_TEST_DB.ANALYTICS.pipeline_execution_log
  etl_audit_log_table: CUSTOMER360_TEST_DB.ANALYTICS.etl_audit_log
  retention_days: 7
pipeline:
  batch_size: 1000
  freshness_hours: 24
  matching_threshold: 0.95
  cdc_column: last_modified_timestamp
  audit_history_enabled: true
ingestion:
  default_batch_size: 1000
  retry:
    max_attempts: 2
    initial_delay_seconds: 0
    max_delay_seconds: 1
    backoff_multiplier: 1.0
    retryable_status_codes: [429, 500, 502, 503, 504]
  sources:
    salesforce:
      enabled: true
      source_system: SALESFORCE
      source_object: ACCOUNT
      source_type: csv
      target_table: CUSTOMER360_TEST_DB.BRONZE.salesforce_customer_bronze
      primary_key: customer_id
      watermark_column: last_modified_timestamp
      csv:
        path: tests/fixtures/salesforce_customer.csv
    marketo:
      enabled: true
      source_system: MARKETO
      source_object: LEAD
      source_type: csv
      target_table: CUSTOMER360_TEST_DB.BRONZE.marketo_lead_bronze
      primary_key: lead_id
      watermark_column: last_modified_timestamp
      csv:
        path: tests/fixtures/marketo_lead.csv
    zendesk:
      enabled: true
      source_system: ZENDESK
      source_object: SUPPORT_ACCOUNT
      source_type: csv
      target_table: CUSTOMER360_TEST_DB.BRONZE.zendesk_support_bronze
      primary_key: support_account_id
      watermark_column: last_modified_timestamp
      csv:
        path: tests/fixtures/zendesk_support.csv
    product_usage:
      enabled: true
      source_system: PRODUCT_USAGE
      source_object: USAGE_DAILY
      source_type: csv
      target_table: CUSTOMER360_TEST_DB.BRONZE.product_usage_bronze
      primary_key: usage_event_id
      watermark_column: last_modified_timestamp
      csv:
        path: tests/fixtures/product_usage.csv
    licensing:
      enabled: true
      source_system: LICENSING
      source_object: LICENSE
      source_type: csv
      target_table: CUSTOMER360_TEST_DB.BRONZE.licensing_customer_bronze
      primary_key: license_id
      watermark_column: last_modified_timestamp
      csv:
        path: tests/fixtures/licensing_customer.csv
    impartner:
      enabled: true
      source_system: IMPARTNER
      source_object: PARTNER
      source_type: csv
      target_table: CUSTOMER360_TEST_DB.BRONZE.impartner_partner_bronze
      primary_key: partner_id
      watermark_column: last_modified_timestamp
      csv:
        path: tests/fixtures/impartner_partner.csv
domo:
  api_host: ${DOMO_API_HOST:-https://api.domo.com}
  client_id: ${DOMO_CLIENT_ID:-test_domo_client_id}
  client_secret: ${DOMO_CLIENT_SECRET:-test_domo_client_secret}
  access_token: ${DOMO_ACCESS_TOKEN:-}
  dataset_prefix: customer360_test
  timeout_seconds: 10
  retry_attempts: 1
