name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - "codex-*"
      - "feature/**"
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: src

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run Ruff lint
        run: python -m ruff check src tests airflow

      - name: Run mypy
        run: python -m mypy src/customer360 tests/unit --config-file pyproject.toml --disable-error-code import-untyped

      - name: Validate SQL script termination
        run: |
          python - <<'PY'
          from pathlib import Path

          errors = []
          for path in sorted(Path("sql").rglob("*.sql")):
              executable = []
              for line in path.read_text(encoding="utf-8").splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("--"):
                      continue
                  executable.append(stripped)
              text = "\n".join(executable)
              if not text:
                  errors.append(f"{path}: no executable SQL")
              elif not text.endswith(";"):
                  errors.append(f"{path}: last executable statement is not terminated")
          if errors:
              raise SystemExit("\n".join(errors))
          print(f"checked {len(list(Path('sql').rglob('*.sql')))} SQL files")
          PY

      - name: Validate YAML and JSON assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          yaml_paths = [
              *Path("configs").rglob("*.yaml"),
              *Path("great_expectations").rglob("*.yml"),
              *Path(".github/workflows").rglob("*.yml"),
          ]
          for path in yaml_paths:
              yaml.safe_load(path.read_text(encoding="utf-8"))

          for path in Path("great_expectations/expectations").rglob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))

          print(f"validated {len(yaml_paths)} YAML files")
          PY

  pytest-coverage:
    name: Pytest Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: code-quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit and integration tests with coverage gate
        run: python -m pytest tests/unit tests/integration

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-coverage
          path: |
            .coverage
            coverage.xml
            htmlcov
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: code-quality
    env:
      CUSTOMER360_CONFIG_PATH: configs/test.yaml
      AIRFLOW_HOME: ${{ runner.temp }}/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run platform healthcheck
        run: python -m customer360.interfaces.cli.main healthcheck

      - name: Parse dbt project
        run: dbt parse --project-dir dbt/customer360 --profiles-dir dbt/customer360 --target dev

      - name: Import Airflow DAGs
        run: |
          python - <<'PY'
          import importlib

          module = importlib.import_module("airflow.dags.customer360_dags")
          dag_ids = sorted(getattr(module, "DAG_IDS"))
          expected = {
              "customer_ingestion_dag",
              "customer_standardization_dag",
              "customer_matching_dag",
              "customer_enrichment_dag",
              "customer_scoring_dag",
              "dashboard_refresh_dag",
          }
          missing = expected.difference(dag_ids)
          if missing:
              raise SystemExit(f"Missing DAGs: {sorted(missing)}")
          print(f"imported {len(dag_ids)} DAG definitions")
          PY

      - name: Run integration tests when present
        run: |
          if compgen -G "tests/integration/test_*.py" > /dev/null; then
            python -m pytest -o addopts='' tests/integration
          else
            echo "No integration test modules found; repository-level integration checks passed."
          fi
