version: 2

models:
  - name: customer_match_predictions
    description: Pairwise customer match predictions staged from Splink.
    columns:
      - name: match_id
        tests:
          - not_null
          - unique
      - name: match_probability
        tests:
          - not_null
          - accepted_range:
              min_value: 0
              max_value: 1
      - name: confidence_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1

  - name: gold_customer_clusters
    description: Resolved customer clusters generated by the Splink matching engine.
    columns:
      - name: cluster_id
        tests:
          - not_null
          - unique
      - name: golden_customer_id
        tests: [not_null]
      - name: cluster_size
        tests:
          - not_null
          - accepted_range:
              min_value: 1
      - name: confidence_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1

  - name: customer_identity_map
    description: Crosswalk from source customer IDs to golden customer IDs.
    columns:
      - name: golden_customer_id
        tests:
          - not_null
          - relationships:
              to: ref('gold_customer_master')
              field: golden_customer_id
      - name: source_system
        tests: [not_null]
      - name: source_customer_id
        tests: [not_null]
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ['golden_customer_id', 'source_system', 'source_customer_id']

  - name: gold_customer_master
    description: Trusted golden customer record after survivorship selection.
    columns:
      - name: golden_customer_id
        tests:
          - not_null
          - unique
      - name: cluster_id
        tests:
          - not_null
          - relationships:
              to: ref('gold_customer_clusters')
              field: cluster_id
      - name: confidence_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1
      - name: completeness_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1
      - name: data_quality_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1

  - name: customer_enrichment_metrics
    description: Customer enrichment metrics for CLV, adoption, engagement, support health, and renewal.
    columns:
      - name: golden_customer_id
        tests:
          - not_null
          - relationships:
              to: ref('gold_customer_master')
              field: golden_customer_id
      - name: metric_date
        tests:
          - not_null
          - not_future_date
      - name: product_adoption_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1
      - name: engagement_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1
      - name: support_health_score
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1
      - name: renewal_probability
        tests:
          - accepted_range:
              min_value: 0
              max_value: 1
    tests:
      - unique_combination_of_columns:
          combination_of_columns: ['golden_customer_id', 'metric_date']
